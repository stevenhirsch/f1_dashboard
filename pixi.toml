[workspace]
authors = ["stevenhirsch <stevehirsch94@gmail.com>"]
channels = ["conda-forge"]
name = "f1_dashboard"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
notebook = "marimo edit dashboard.py"

[feature.pipeline.tasks]
test = "pytest pipeline/tests/ -v"

[dependencies]
marimo = ">=0.20.4,<0.21"
requests = ">=2.32.5,<3"
matplotlib = ">=3.10.8,<4"
plotly = ">=6.6.0,<7"
altair = ">=6.0.0,<7"
pandas = ">=2.2,<3"
numpy = ">=2.0,<3"
pytest = ">=9.0.2,<10"
scipy = ">=1.17.1,<2"

[feature.pipeline.dependencies]
requests = ">=2.32.5,<3"
websockets = "<16"
numpy = ">=2.0,<3"
scipy = ">=1.17.1,<2"
pandas = ">=2.2,<3"

[feature.pipeline.pypi-dependencies]
supabase = ">=2.0,<3"

[environments]
pipeline = { features = ["pipeline"], solve-group = "pipeline" }
